name: "nombresArchivos"
description: "verifica y opcionalmente corrige nombres de archivos a kebab-case"
author: "piruetasxyz"

branding: 
  color: purple
  icon: file

inputs:
  pattern:
    description: "regex para nombres válidos (kebab-case)"
    required: false
    default: '^[a-z0-9]+([.-][a-z0-9]+)*$'

  ignore:
    description: "regex para archivos a ignorar"
    required: false
    default: '(^|/)(README\.md|LICENSE|\.gitignore)$|^\.github/'

  arreglar:
    description: "corrige automáticamente los nombres a kebab-case"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Verificar / Corregir nombres de archivos
      shell: bash
      run: |

        pattern="${{ inputs.pattern }}"
        ignore="${{ inputs.ignore }}"
        arreglar="${{ inputs.arreglar }}"

        invalid=""

        normalizar() {
          echo "$1" \
            | iconv -f utf8 -t ascii//TRANSLIT 2>/dev/null \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[[:space:]]+/-/g' \
            | sed -E 's/[^a-z0-9._-]//g' \
            | sed -E 's/[._-]+/-/g' \
            | sed -E 's/^-+|-+$//g'
        }

        split_nombre() {
          nombre="$1"

          case "$nombre" in
            *.tar.gz) base="${nombre%.tar.gz}"; ext="tar.gz" ;;
            *.tar.bz2) base="${nombre%.tar.bz2}"; ext="tar.bz2" ;;
            *.tar.xz) base="${nombre%.tar.xz}"; ext="tar.xz" ;;
            *.min.js) base="${nombre%.min.js}"; ext="min.js" ;;
            *.min.css) base="${nombre%.min.css}"; ext="min.css" ;;
            *)
              base="${nombre%.*}"
              ext="${nombre##*.}"
              if [ "$base" = "$ext" ]; then
                ext=""
              fi
              ;;
          esac
        }

        ########################################
        # 🔥 Detectar archivos a procesar
        ########################################

        if [ -n "$GITHUB_BASE_REF" ]; then
          echo "🔍 Modo PR: comparando contra $GITHUB_BASE_REF"
          archivos=$(git diff --name-only origin/$GITHUB_BASE_REF...HEAD)
        else
          echo "🔍 Modo push: usando último commit"
          archivos=$(git diff --name-only HEAD~1 HEAD)
        fi

        # fallback si está vacío
        if [ -z "$archivos" ]; then
          echo "ℹ️ No hay diff, usando todos los archivos"
          archivos=$(git ls-files)
        fi

        ########################################
        # 🚀 Procesar archivos
        ########################################

        echo "$archivos" | while IFS= read -r file; do

          # evitar líneas vacías
          [ -z "$file" ] && continue

          nombre=$(basename "$file")
          directorio=$(dirname "$file")

          if echo "$file" | grep -Eq -- "$ignore"; then
            continue
          fi

          if [ "$arreglar" = "true" ]; then

            split_nombre "$nombre"

            if [ -z "$ext" ]; then
              nuevo_nombre=$(normalizar "$nombre")
            else
              base_norm=$(normalizar "$base")
              ext_norm=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
              nuevo_nombre="$base_norm.$ext_norm"
            fi

            if [ -z "$nuevo_nombre" ]; then
              echo "⚠️ Se omite porque quedaría vacío: $file"
              continue
            fi

            nueva_ruta="$directorio/$nuevo_nombre"

            if [ "$file" != "$nueva_ruta" ] && git ls-files --error-unmatch "$nueva_ruta" >/dev/null 2>&1; then
              echo "❌ Colisión detectada:"
              echo "   $file"
              echo "   → $nueva_ruta"
              exit 1
            fi

            if [ "$nombre" != "$nuevo_nombre" ]; then
              echo "🔧 Renombrando:"
              echo "   $file"
              echo "   → $nueva_ruta"

              git mv "$file" "$nueva_ruta"
              nombre="$nuevo_nombre"
            fi
          fi

          if ! echo "$nombre" | grep -Eq "$pattern"; then
            invalid="$invalid\n$file"
          fi

        done

        ########################################
        # 🧾 Resultado
        ########################################

        if [ -n "$invalid" ]; then
          echo "❌ Nombres inválidos:"
          echo -e "$invalid" | sed '/^$/d' | sed 's/^/ - /'
          exit 1
        fi

        echo "✅ Todo correcto"