name: "nombresArchivos"
description: "enforce kebab-case en nombres de archivo"
author: "piruetasxyz"

branding: 
  color: purple
  icon: file

inputs:
  pattern:
    description: "Regex for valid filenames (kebab-case)"
    required: false
    default: '^[a-z0-9]+([._-][a-z0-9]+)*$'

  ignore:
    description: "Regex for files to ignore"
    required: false
    default: '(^|/)README\.md|LICENSE|\.gitignore)$|^\.github/'

runs:
  using: "composite"
  steps:
    - name: Check filenames
      shell: bash
      run: |

        pattern="${{ inputs.pattern }}"
        ignore="${{ inputs.ignore }}"

        invalid=""

        while IFS= read -r file; do
          name=$(basename "$file")

          # Skip ignored filenames
          if [ -n "$ignore" ]; then
            if echo "$file" | grep -Eq -- "$ignore"; then
              continue
            fi
          fi

          # Check pattern (invertido correctamente)
          if ! echo "$name" | grep -Eq "$pattern"; then
            invalid="$invalid\n$file"
          fi
        done < <(git ls-files)

        if [ -n "$invalid" ]; then
          echo "❌ nombresArchivosMal:"
          echo -e "$invalid" | sed '/^$/d' | sed 's/^/ - /'
          exit 1
        fi

        echo "✅ nombresArchivosBien"