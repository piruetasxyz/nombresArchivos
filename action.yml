name: "nombresArchivos"
description: "no permite mayúsculas, espacios y acentos en nombres de archivo"
author: "piruetasxyz"
branding: 
  color: purple
  icon: file
  

inputs:
  pattern:
    description: "Regex for invalid filenames"
    required: false
    default: '[A-Z]|[ ]|[áéíóúÁÉÍÓÚ]'

  ignore:
    description: "Regex for files to ignore"
    required: false
    default: '^README\.md$'

runs:
  using: "composite"
  steps:
    - name: Check filenames
      shell: bash
      run: |

        invalid=""

        while IFS= read -r file; do
          name=$(basename "$file")

          # Skip ignored filenames
          if [[ -n "${{ inputs.ignore }}" && "$name" =~ ${{ inputs.ignore }} ]]; then
            continue
          fi

          # Check pattern
          if [[ "$name" =~ ${{ inputs.pattern }} ]]; then
            invalid="$invalid\n$file"
          fi
        done < <(git ls-files)

        if [ -n "$invalid" ]; then
          echo "❌ nombresArchivosMal:"
          echo "$invalid" | sed 's/^/ - /'
          exit 1
        fi

        echo "✅ nombresArchivosBien"
